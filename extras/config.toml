# driftwm — personal config (symlink to ~/.config/driftwm/config.toml)
# ln -sf ~/Documents/work/scripts/driftwm/extras/config.toml ~/.config/driftwm/config.toml

autostart = [
    "/usr/libexec/polkit-gnome-authentication-agent-1",
    "swayosd-server --top-margin 0.95",
    "swaync",
    "waybar -c ~/.config/waybar/taskbar.jsonc -s ~/.config/waybar/taskbar.css",
    "sleep 1 && waybar -c ~/.config/waybar/tray.jsonc -s ~/.config/waybar/tray.css",
    "vorta -d",
    "~/Documents/work/scripts/driftwm/extras/widgets/launch.sh",
    "~/Documents/work/scripts/driftwm/extras/scripts/battery_notify.sh",
    "swayidle -w timeout 300 'brightnessctl -s set 10%' resume 'brightnessctl -r' timeout 330 '~/Documents/work/scripts/driftwm/extras/scripts/lock.sh' timeout 600 'systemctl suspend' before-sleep '~/Documents/work/scripts/driftwm/extras/scripts/lock.sh'",
]

[env]
QT_WAYLAND_DISABLE_WINDOWDECORATION = "1"

[input.keyboard]
layout = "us,ru"
options = "grp:win_space_toggle"

[cursor]
theme = "elementary"

[decorations]
bg_color = "#FDF6E3"
fg_color = "#5C6A72"

[background]
shader_path = "~/.config/driftwm/pink_cloud.glsl"

[output.outline]
color="#FDF6E3"

[keybindings]
"mod+return" = "exec ptyxis -s"
"mod+d" = "exec fuzzel"
"mod+l" = "spawn ~/Documents/work/scripts/driftwm/extras/scripts/lock.sh"
"mod+n" = "spawn swaync-client -t"
# swayosd instead of default wpctl/brightnessctl
"XF86AudioRaiseVolume" = "spawn swayosd-client --output-volume raise"
"XF86AudioLowerVolume" = "spawn swayosd-client --output-volume lower"
"XF86AudioMute" = "spawn swayosd-client --output-volume mute-toggle"
"XF86MonBrightnessUp" = "spawn swayosd-client --brightness raise"
"XF86MonBrightnessDown" = "spawn swayosd-client --brightness lower"

[[outputs]]
name = "HDMI-A-1"
transform = "90"

# Dashboard widgets — positioned around origin for home view (1920x1080)

[[window_rules]]
app_id = "drift-clock"
position = [-93, 205]
no_focus = true
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-stats"
position = [-93, 0]
no_focus = false
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-canvas"
position = [-129, -185]
no_focus = true
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-layout"
position = [42, -185]
no_focus = true
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-calendar"
position = [186, 0]
no_focus = true
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-weather"
position = [186, 205]
no_focus = true
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-notif"
position = [190, -185]
no_focus = false
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-power"
position = [274, -259]
no_focus = false
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-power-menu"
position = [274, -370]
no_focus = false
widget = true
decoration = "server"

[[window_rules]]
app_id = "waybar"
position = [-289, 21]
widget = true
decoration = "none"

[[window_rules]]
app_id = "waybar"
position = [126, -259]
widget = true
decoration = "none"

# Cosmic settings: hide winit window helper and apply fixed window size
[[window_rules]]
title = "winit window"
widget = true
no_focus = true

[[window_rules]]
app_id = "com.system76.CosmicSettings"
size=[500, 725]

# Server side decoration
[[window_rules]]
app_id = "org.telegram.desktop"
decoration = "server"

# Blur notifications
[[window_rules]]
app_id = "swaync-control-center"
blur = true

[[window_rules]]
app_id = "swaync-notification-window"
blur = true
